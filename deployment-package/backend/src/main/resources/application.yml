server:
  port: 8082

spring:
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    wait-for-jobs-to-complete-on-shutdown: true
    overwrite-existing-jobs: true
    startup-delay: 10s
    properties:
      org:
        quartz:
          scheduler:
            instanceId: AUTO
            instanceName: ReportScheduler
          jobStore:
            class: org.quartz.impl.jdbcjobstore.JobStoreTX
            driverDelegateClass: org.quartz.impl.jdbcjobstore.StdJDBCDelegate
            tablePrefix: QRTZ_
            isClustered: true
            clusterCheckinInterval: 20000
            acquireTriggersWithinLock: true
            useProperties: false
  task:
    execution:
      pool:
        core-size: 2
        max-size: 10
        queue-capacity: 100
        thread-name-prefix: async-log-

logging:
  level:
    com.report: debug

ftp:
  built-in:
    enabled: false
    port: 2021
    username: rpa_user
    password: rpa_password
    root-directory: /data/ftp-root
    max-connections: 10
    idle-timeout: 300
    passive-mode: true
    passive-port-start: 50000
    passive-port-end: 50100
    max-threads: 5

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.report.entity
  configuration:
    map-underscore-to-camel-case: true
