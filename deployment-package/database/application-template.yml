spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:report_db}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root123}
    druid:
      initial-size: 10
      min-idle: 10
      max-active: 50
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      web-stat-filter:
        enabled: true
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: ${DRUID_USER:admin}
        login-password: ${DRUID_PASSWORD:admin}

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.report.entity
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

ftp:
  built-in:
    enabled: ${FTP_ENABLED:true}
    port: ${FTP_PORT:9021}
    username: ${FTP_USER:rpa_user}
    password: ${FTP_PASSWORD:rpa_password}
    root-directory: ${FTP_ROOT:/data/ftp-root}
    idle-timeout: 300
    max-connections: 10

logging:
  level:
    com.report: ${LOG_LEVEL:debug}
    org.quartz: ${LOG_LEVEL:debug}