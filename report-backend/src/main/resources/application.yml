server:
  port: 8082

spring:
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  quartz:
    job-store-type: memory
    wait-for-jobs-to-complete-on-shutdown: true
    overwrite-existing-jobs: true
    startup-delay: 10s
  task:
    execution:
      pool:
        core-size: 2
        max-size: 10
        queue-capacity: 100
        thread-name-prefix: async-log-

logging:
  level:
    com.report: debug
